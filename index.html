document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   <\u002Fdiv>\n          <p class=\"text-cream/70 leading-relaxed text-[15px]\">\n            Pulls call transcript links straight out of Gong, matches them to the\n            right company, and drops them into a per-company Drive folder — fully\n            background-queued with live progress. Your Gong session persists between\n            opens, so you log in once and forget about it.\n          <\u002Fp>\n          <div class=\"mt-5 flex flex-wrap gap-2 text-[11px] font-mono\">\n            <span class=\"px-2 py-1 rounded bg-teal-500/10 text-teal-400 border border-teal-500/20\">gong_collect<\u002Fspan>\n            <span class=\"px-2 py-1 rounded bg-teal-500/10 text-teal-400 border border-teal-500/20\">drive_organize<\u002Fspan>\n            <span class=\"px-2 py-1 rounded bg-teal-500/10 text-teal-400 border border-teal-500/20\">auto-retry<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Feature 2: Draggable Dashboard -->\n        <article class=\"feature-card shine-target rounded-2xl border border-cream/10 bg-ink2/40 p-7\">\n          <div class=\"flex items-start gap-4 mb-4\">\n            <div class=\"w-11 h-11 rounded-lg bg-lagoon/20 border border-lagoon/40 flex items-center justify-center flex-shrink-0\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#57A7B9\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <circle cx=\"9\" cy=\"5\" r=\"1.3\"><\u002Fcircle><circle cx=\"9\" cy=\"12\" r=\"1.3\"><\u002Fcircle><circle cx=\"9\" cy=\"19\" r=\"1.3\"><\u002Fcircle>\n                <circle cx=\"15\" cy=\"5\" r=\"1.3\"><\u002Fcircle><circle cx=\"15\" cy=\"12\" r=\"1.3\"><\u002Fcircle><circle cx=\"15\" cy=\"19\" r=\"1.3\"><\u002Fcircle>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"eyebrow\" style=\"color:#57A7B9\">02 · Personalization<\u002Fdiv>\n              <h3 class=\"text-xl font-extrabold text-cream mt-1\">Draggable Dashboard<\u002Fh3>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"text-cream/70 leading-relaxed text-[15px]\">\n            Every widget — stats, upcoming calls, recent jobs, knowledge search — is\n            drag-to-rearrange. Hide the ones you don't use; they're tucked into\n            <span class=\"font-semibold text-cream/90\">Add Table<\u002Fspan> and ready whenever\n            you change your mind. Layout is saved per-user to local storage.\n          <\u002Fp>\n          <div class=\"mt-5 flex flex-wrap gap-2 text-[11px] font-mono\">\n            <span class=\"px-2 py-1 rounded bg-lagoon/10 text-lagoon border border-lagoon/30\" style=\"color:#86D1C3;background:rgba(87,167,185,0.10);border-color:rgba(87,167,185,0.3)\">drag · drop<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#86D1C3;background:rgba(87,167,185,0.10);border-color:rgba(87,167,185,0.3); border-width:1px; border-style:solid\">hideable<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#86D1C3;background:rgba(87,167,185,0.10);border-color:rgba(87,167,185,0.3); border-width:1px; border-style:solid\">persistent<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Feature 3: Knowledge Base -->\n        <article class=\"feature-card shine-target rounded-2xl border border-cream/10 bg-ink2/40 p-7\">\n          <div class=\"flex items-start gap-4 mb-4\">\n            <div class=\"w-11 h-11 rounded-lg flex items-center justify-center flex-shrink-0\" style=\"background:rgba(244,183,78,0.12); border:1px solid rgba(244,183,78,0.35)\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4B74E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <path d=\"M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z\"><\u002Fpath><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"eyebrow\" style=\"color:#F4B74E\">03 · Search<\u002Fdiv>\n              <h3 class=\"text-xl font-extrabold text-cream mt-1\">Knowledge Base + Assistant<\u002Fh3>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"text-cream/70 leading-relaxed text-[15px]\">\n            A fuzzy in-memory search (Fuse.js) over internal and customer-facing\n            wiki content — right from the dashboard widget. Click a result to open\n            it, or jump to the Assistant for a broader browse. Rebuild the index\n            whenever the source docs change.\n          <\u002Fp>\n          <div class=\"mt-5 flex flex-wrap gap-2 text-[11px] font-mono\">\n            <span class=\"px-2 py-1 rounded\" style=\"color:#FFD387;background:rgba(244,183,78,0.10);border:1px solid rgba(244,183,78,0.3)\">Fuse.js<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#FFD387;background:rgba(244,183,78,0.10);border:1px solid rgba(244,183,78,0.3)\">internal + customer<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#FFD387;background:rgba(244,183,78,0.10);border:1px solid rgba(244,183,78,0.3)\">rebuildable<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <!-- Feature 4: Scrub & Split -->\n        <article class=\"feature-card shine-target rounded-2xl border border-cream/10 bg-ink2/40 p-7\">\n          <div class=\"flex items-start gap-4 mb-4\">\n            <div class=\"w-11 h-11 rounded-lg flex items-center justify-center flex-shrink-0\" style=\"background:rgba(134,209,195,0.12); border:1px solid rgba(134,209,195,0.35)\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#86D1C3\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                <circle cx=\"6\" cy=\"6\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle>\n                <path d=\"M20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"eyebrow\" style=\"color:#86D1C3\">04 · Tooling<\u002Fdiv>\n              <h3 class=\"text-xl font-extrabold text-cream mt-1\">Scrub &amp; Split CSV<\u002Fh3>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"text-cream/70 leading-relaxed text-[15px]\">\n            Drop in a messy export — dedupe rows, split columns, and normalize in\n            seconds. Pair it with the HubSpot import and a scheduled\n            <span class=\"font-mono text-cream/90 text-[13px]\">cron<\u002Fspan> job\n            (hourly, weekdays-only, whatever) and the Book of Business stays clean\n            on its own.\n          <\u002Fp>\n          <div class=\"mt-5 flex flex-wrap gap-2 text-[11px] font-mono\">\n            <span class=\"px-2 py-1 rounded\" style=\"color:#86D1C3;background:rgba(134,209,195,0.10);border:1px solid rgba(134,209,195,0.3)\">CSV · dedupe<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#86D1C3;background:rgba(134,209,195,0.10);border:1px solid rgba(134,209,195,0.3)\">HubSpot import<\u002Fspan>\n            <span class=\"px-2 py-1 rounded\" style=\"color:#86D1C3;background:rgba(134,209,195,0.10);border:1px solid rgba(134,209,195,0.3)\">cron schedules<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ═══════════════════════ AUTO-UPDATER NOTE ═══════════════════════ -->\n  <section id=\"updates\" class=\"relative py-16\">\n    <div class=\"max-w-5xl mx-auto px-8\">\n      <div class=\"shine-target relative rounded-2xl overflow-hidden border border-teal-500/25 bg-gradient-to-br from-teal-600/15 via-ink2/60 to-ink/50 p-8 md:p-10\">\n\n        <!-- Decorative chevrons -->\n        <svg class=\"absolute -right-6 -top-6 opacity-20\" width=\"180\" height=\"180\" viewBox=\"0 0 180 180\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M30 90 L80 40 L130 90 L80 140 Z\" stroke=\"#86D1C3\" stroke-width=\"1.5\"><\u002Fpath>\n          <path d=\"M60 90 L80 70 L100 90 L80 110 Z\" stroke=\"#56B7A3\" stroke-width=\"1.5\"><\u002Fpath>\n        <\u002Fsvg>\n\n        <div class=\"flex flex-col md:flex-row md:items-center gap-8 relative\">\n          <!-- Icon -->\n          <div class=\"w-16 h-16 rounded-2xl bg-teal-500/20 border border-teal-500/40 flex items-center justify-center flex-shrink-0\">\n            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#56B7A3\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath>\n              <polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline>\n              <line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <div class=\"flex-1\">\n            <div class=\"eyebrow text-teal-400 mb-2\">Auto-updates · Built in<\u002Fdiv>\n            <h3 class=\"text-2xl md:text-3xl font-extrabold text-cream leading-tight\">\n              Install once. B.O.B. takes care of the rest.\n            <\u002Fh3>\n            <p class=\"mt-3 text-cream/70 leading-relaxed max-w-2xl\">\n              Every future release downloads silently in the background and applies\n              on your next relaunch — no reinstalls, no hunting for dmg links. You\n              can also pop into <span class=\"font-mono text-teal-400 text-[13px]\">Settings → App Updates<\u002Fspan>\n              to check manually anytime.\n            <\u002Fp>\n          <\u002Fdiv>\n\n          <!-- Faux status card -->\n          <div class=\"flex-shrink-0 w-full md:w-72 rounded-xl bg-ink/70 border border-cream/10 p-4 font-mono text-xs\">\n            <div class=\"flex items-center gap-2 text-fern-400\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n              <span class=\"font-bold\">Up to date<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mt-3 text-cream/50\">Version <span class=\"text-cream\">1.0.0<\u002Fspan><\u002Fdiv>\n            <div class=\"text-cream/50\">Channel <span class=\"text-cream\">stable<\u002Fspan><\u002Fdiv>\n            <div class=\"mt-3 pt-2 border-t border-cream/10 text-[10px] text-cream/30\">Next check in 4h<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ═══════════════════════ INSTALL / CTA STRIP ═══════════════════════ -->\n  <section id=\"install\" class=\"relative py-20\">\n    <div class=\"max-w-4xl mx-auto px-8 text-center\">\n      <div class=\"eyebrow text-teal-400 mb-4\">Ready when you are<\u002Fdiv>\n      <h2 class=\"text-4xl md:text-5xl font-extrabold text-cream leading-tight\">\n        Grab v1.0.0 and take it<br>for a spin.\n      <\u002Fh2>\n      <p class=\"mt-5 text-lg text-cream/60 max-w-2xl mx-auto\">\n        Internal tool — log in with your\n        <span class=\"font-semibold text-cream\">@prokeep.com<\u002Fspan> Google account on first\n        launch and everything else connects automatically.\n      <\u002Fp>\n\n      <div class=\"mt-10 flex flex-col sm:flex-row items-center justify-center gap-4\">\n        <a href=\"https://github.com/man-tim/bob/releases/download/v1.0.0/B.O.B-1.0.0-arm64.dmg\" class=\"cta inline-flex items-center gap-3 px-8 py-4 rounded-xl text-ink font-bold\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\">\n            <path d=\"M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z\"><\u002Fpath>\n          <\u002Fsvg>\n          Download for Mac\n        <\u002Fa>\n        <div class=\"text-xs font-mono text-cream/40 flex items-center gap-2\">\n          <span class=\"px-2 py-1 rounded bg-ink2/60 border border-cream/10\">B.O.B-1.0.0-arm64.dmg<\u002Fspan>\n          <span>~ 120 MB<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hand-off note -->\n      <div class=\"mt-16 text-sm text-cream/50 max-w-2xl mx-auto border-t border-cream/10 pt-8\">\n        Questions, bugs, or feature asks? Drop them in\n        <span class=\"font-semibold text-teal-400\">#bob-feedback<\u002Fspan>\n        or reply to the launch thread. This is v1 — we want to hear what breaks.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ═══════════════════════ FOOTER ═══════════════════════ -->\n  <footer class=\"border-t border-cream/10\">\n    <div class=\"max-w-7xl mx-auto px-8 py-8 flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-cream/40 font-mono\">\n      <div class=\"flex items-center gap-3\">\n        <svg viewBox=\"0 0 40 40\" class=\"w-5 h-5\" aria-hidden=\"true\">\n          <rect x=\"3\" y=\"3\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#56B7A3\"><\u002Frect>\n          <rect x=\"22\" y=\"3\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#86D1C3\"><\u002Frect>\n          <rect x=\"3\" y=\"22\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#2A7991\"><\u002Frect>\n          <rect x=\"22\" y=\"22\" width=\"15\" height=\"15\" rx=\"2\" fill=\"#57A7B9\"><\u002Frect>\n        <\u002Fsvg>\n        <span>Prokeep · Internal Tools · B.O.B. v1.0.0<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"flex items-center gap-5\">\n        <span>Built with Electron + React 18<\u002Fspan>\n        <span class=\"w-px h-3 bg-cream/20\"><\u002Fspan>\n        <a href=\"#\" class=\"hover:text-teal-400 transition\">Changelog<\u002Fa>\n        <a href=\"#\" class=\"hover:text-teal-400 transition\">#bob-feedback<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ─────────────────────────────────────────────────────────────────────\n       Dashboard \"drag-to-rearrange\" hint animation.\n       Picks two stat cards, lifts one, glides them past each other,\n       then settles. FLIP-style transforms only — no layout reflow.\n       Triggers once on viewport entry, then loops with a long pause.\n       Respects prefers-reduced-motion.\n       ───────────────────────────────────────────────────────────────────── -->\n  <style>\n    [data-drag-cell] {\n      will-change: transform;\n      transition: transform 1100ms cubic-bezier(.22, 1, .36, 1),\n                  box-shadow 350ms ease,\n                  border-color 350ms ease,\n                  z-index 0s linear 0s;\n    }\n    [data-drag-cell].is-lifted {\n      box-shadow:\n        0 18px 36px -8px rgba(0,0,0,.55),\n        0 0 0 1px rgba(134, 209, 195, .35);\n      border-color: rgba(134, 209, 195, .35) !important;\n      z-index: 5;\n      position: relative;\n    }\n  <\u002Fstyle>\n  <script>\n  (function () {\n    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n\n    const grid = document.getElementById('dashStatGrid');\n    if (!grid) return;\n    const cells = Array.from(grid.querySelectorAll('[data-drag-cell]'));\n    if (cells.length < 2) return;\n\n    const wait = (ms) => new Promise(r => setTimeout(r, ms));\n\n    // Swap two cells visually using FLIP transforms, then commit by reordering DOM\n    // and clearing transforms — net zero visual change, repeatable forever.\n    async function swap(aIdx, bIdx) {\n      const liveCells = Array.from(grid.querySelectorAll('[data-drag-cell]'));\n      const a = liveCells[aIdx], b = liveCells[bIdx];\n      if (!a || !b) return;\n\n      const ra = a.getBoundingClientRect();\n      const rb = b.getBoundingClientRect();\n      const dx = rb.left - ra.left;\n      const dy = rb.top  - ra.top;\n\n      // Lift the \"dragged\" card a touch first\n      a.classList.add('is-lifted');\n      a.style.transition = 'transform 250ms ease-out, box-shadow 250ms ease, border-color 250ms ease';\n      a.style.transform = 'translate(0px, -4px) scale(1.015)';\n      await wait(280);\n\n      // Glide both cards past each other on a slow ease\n      a.style.transition = 'transform 1100ms cubic-bezier(.22, 1, .36, 1), box-shadow 350ms ease, border-color 350ms ease';\n      b.style.transition = 'transform 1100ms cubic-bezier(.22, 1, .36, 1)';\n      a.style.transform = `translate(${dx}px, ${dy - 4}px) scale(1.015)`;\n      b.style.transform = `translate(${-dx}px, ${-dy}px)`;\n      await wait(1150);\n\n      // Settle the lift\n      a.style.transition = 'transform 220ms ease-out, box-shadow 350ms ease, border-color 350ms ease';\n      a.style.transform = `translate(${dx}px, ${dy}px) scale(1)`;\n      a.classList.remove('is-lifted');\n      await wait(260);\n\n      // Commit: reorder DOM and clear transforms in one frame so nothing flickers\n      const aBefore = a.previousSibling;\n      const bBefore = b.previousSibling;\n      if (aBefore === b) {\n        grid.insertBefore(a, b);\n      } else if (bBefore === a) {\n        grid.insertBefore(b, a);\n      } else {\n        // General case: swap by inserting placeholders\n        const aMarker = document.createComment('');\n        const bMarker = document.createComment('');\n        a.parentNode.insertBefore(aMarker, a);\n        b.parentNode.insertBefore(bMarker, b);\n        aMarker.parentNode.insertBefore(b, aMarker);\n        bMarker.parentNode.insertBefore(a, bMarker);\n        aMarker.remove(); bMarker.remove();\n      }\n      // Clear inline styles after DOM is in its final order\n      a.style.transition = 'none';\n      b.style.transition = 'none';\n      a.style.transform = '';\n      b.style.transform = '';\n      // Force reflow then restore the base transition\n      void a.offsetWidth; void b.offsetWidth;\n      a.style.transition = '';\n      b.style.transition = '';\n    }\n\n    // Choreography: pause, swap two adjacent cards, pause, swap a different pair, long pause, loop.\n    const sequences = [\n      [0, 1], // Companies <-> Transcripts\n      [2, 3], // Upcoming Calls <-> Active Jobs\n      [1, 2], // middle two\n    ];\n\n    async function run() {\n      // Initial pause once visible — gives the eye time to take in the dashboard.\n      await wait(1400);\n      for (let i = 0; i < sequences.length; i++) {\n        const [a, b] = sequences[i];\n        await swap(a, b);\n        await wait(i === sequences.length - 1 ? 0 : 1800); // beat between swaps\n      }\n    }\n\n    let started = false;\n    let loopHandle = null;\n\n    async function loopForever() {\n      while (true) {\n        await run();\n        // Long calm pause between full cycles so it never feels busy.\n        await wait(14000);\n      }\n    }\n\n    const io = new IntersectionObserver((entries) => {\n      for (const e of entries) {\n        if (e.isIntersecting && !started) {\n          started = true;\n          io.disconnect();\n          loopForever();\n          return;\n        }\n      }\n    }, { threshold: 0.35 });\n\n    io.observe(grid);\n  })();\n  <\u002Fscript>\n\n  <!-- ─────────────────────────────────────────────────────────────────────\n       Dashboard sheen sweep — single soft gradient band that drifts\n       diagonally across the dashboard once when it enters the viewport.\n       Repeats at long, calm intervals. Respects prefers-reduced-motion.\n       ───────────────────────────────────────────────────────────────────── -->\n  <style>\n    /* Any container tagged .shine-target hosts an overlay sweep. */\n    .shine-target { position: relative; overflow: hidden; }\n\n    .dash-shine-overlay {\n      position: absolute;\n      inset: 0;\n      pointer-events: none;\n      overflow: hidden;\n      border-radius: inherit;\n      opacity: 0;\n      z-index: 4;\n    }\n    .dash-shine-overlay::before {\n      content: \"\";\n      position: absolute;\n      /* Make the band larger than the box so it can sweep fully through */\n      top: -60%;\n      left: -60%;\n      width: 220%;\n      height: 220%;\n      /* Soft diagonal sheen — wide gradient, low alpha, no sharp line. */\n      background:\n        linear-gradient(\n          115deg,\n          transparent 38%,\n          rgba(255, 244, 227, 0.04) 46%,\n          rgba(255, 244, 227, 0.11) 50%,\n          rgba(255, 244, 227, 0.04) 54%,\n          transparent 62%\n        );\n      transform: translate3d(-60%, -60%, 0);\n    }\n    .dash-shine-overlay.is-sweeping {\n      opacity: 1;\n    }\n    .dash-shine-overlay.is-sweeping::before {\n      animation: dashShineSweep 1700ms cubic-bezier(.45, .05, .35, 1) forwards;\n    }\n    @keyframes dashShineSweep {\n      0%   { transform: translate3d(-60%, -60%, 0); }\n      100% { transform: translate3d( 30%,  30%, 0); }\n    }\n    @media (prefers-reduced-motion: reduce) {\n      .dash-shine-overlay { display: none; }\n    }\n  <\u002Fstyle>\n  <script>\n  (function () {\n    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n\n    // Collect every container that should receive a sheen sweep:\n    // the main dashboard mock + every feature/auto-updates card tagged\n    // with .shine-target. Dedupe in case both selectors match.\n    const hosts = new Set();\n    const dash = document.getElementById('dashShine');\n    if (dash) hosts.add(dash);\n    document.querySelectorAll('.shine-target').forEach(el => hosts.add(el));\n    if (hosts.size === 0) return;\n\n    function attach(host) {\n      // Ensure host is a positioned, clipped containing block\n      const cs = getComputedStyle(host);\n      if (cs.position === 'static') host.style.position = 'relative';\n      if (cs.overflow === 'visible') host.style.overflow = 'hidden';\n\n      const overlay = document.createElement('div');\n      overlay.className = 'dash-shine-overlay';\n      host.appendChild(overlay);\n\n      function sweep() {\n        overlay.classList.remove('is-sweeping');\n        // Force reflow so re-adding the class restarts the animation\n        void overlay.offsetWidth;\n        overlay.classList.add('is-sweeping');\n        setTimeout(() => overlay.classList.remove('is-sweeping'), 1750);\n      }\n\n      let played = false;\n      const io = new IntersectionObserver((entries) => {\n        for (const e of entries) {\n          if (e.isIntersecting && !played) {\n            played = true;\n            // Tiny delay so the user's eyes have landed on the card\n            setTimeout(() => {\n              sweep();\n              // Optional very-infrequent re-fire while still in view\n              setInterval(() => {\n                if (document.visibilityState !== 'visible') return;\n                const r = host.getBoundingClientRect();\n                if (r.top < window.innerHeight && r.bottom > 0) sweep();\n              }, 22000);\n            }, 350);\n            io.disconnect();\n            return;\n          }\n        }\n      }, { threshold: 0.4 });\n\n      io.observe(host);\n    }\n\n    hosts.forEach(attach);\n  })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
